name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d

      - name: Flake check
        run: nix flake check

      - name: Build
        run: nix build

      - name: Verify output
        run: |
          test -d result/www
          test -f result/www/index.html
          test -f result/Caddyfile

      - name: Lint
        run: nix develop -c nixfmt --check .
