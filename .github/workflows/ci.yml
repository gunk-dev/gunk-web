name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate index.html exists
        run: test -f index.html

      - name: Build Docker image
        run: docker build -t gunk-web .
